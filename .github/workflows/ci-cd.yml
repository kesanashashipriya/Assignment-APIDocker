name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Run unit tests
        run: npx jest --forceExit --detectOpenHandles

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t task-management-api:latest .

      - name: Run Docker container (smoke test)
        run: |
          docker run -d --name api-test -p 3000:3000 \
            -e JWT_SECRET=test_secret \
            -e JWT_EXPIRES_IN=1h \
            task-management-api:latest
          sleep 3
          curl -f http://localhost:3000/ || exit 1
          docker stop api-test
          docker rm api-test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          docker compose up -d --build
          echo "Application deployed successfully on port 3000"
